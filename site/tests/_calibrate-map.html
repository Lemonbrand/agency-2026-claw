<!doctype html>
<html><head><meta charset="utf-8"><title>map calibration</title></head>
<body>
<div id="root" style="width: 1200px; height: 1400px;"></div>
<script>
fetch('/img/north-america.svg')
  .then(r => r.text())
  .then(text => {
    document.getElementById('root').innerHTML = text;
    const svg = document.querySelector('#root svg');
    svg.setAttribute('width', '1200');
    svg.setAttribute('height', '1400');

    // Use getCTM to get the path's transformation relative to the viewport.
    // We want bbox in the SVG viewBox coordinate space (NOT screen pixels and
    // NOT pre-transform local space). To get that, we read getBBox() (local
    // path coords) and apply the path's CTM combined with the inverse of the
    // SVG element's screen CTM.
    function viewBoxBBox(el) {
      const bb = el.getBBox();
      const ctm = el.getCTM();         // local -> SVG viewBox coords
      const pt = svg.createSVGPoint();
      const corners = [
        [bb.x, bb.y],
        [bb.x + bb.width, bb.y],
        [bb.x, bb.y + bb.height],
        [bb.x + bb.width, bb.y + bb.height],
      ].map(([x, y]) => {
        pt.x = x; pt.y = y;
        const t = pt.matrixTransform(ctm);
        return { x: t.x, y: t.y };
      });
      const xs = corners.map(c => c.x);
      const ys = corners.map(c => c.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      return { x: minX, y: minY, w: maxX - minX, h: maxY - minY, cx: (minX+maxX)/2, cy: (minY+maxY)/2 };
    }

    const targets = ['US-CA','US-OR','US-WA','US-VA','US-TX','US-NY','US-NV','US-AZ','US-FL','CA-ON','CA-QC','CA-AB','CA-BC'];
    const results = {};
    for (const id of targets) {
      const el = document.getElementById(id);
      if (!el) { results[id] = null; continue; }
      try { results[id] = viewBoxBBox(el); }
      catch (err) { results[id] = { error: err.message }; }
    }
    const vb = svg.getAttribute('viewBox');
    document.title = 'CALIB: ' + vb;
    window._calibration = { viewBox: vb, results };
    document.body.dataset.ready = 'yes';
  });
</script>
</body></html>
